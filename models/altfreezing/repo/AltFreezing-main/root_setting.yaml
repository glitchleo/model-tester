# this is the root setting of all setting and will be loaded in first place
# the loading sequence is root_setting -> specific setting
# -> manully overided setting -> computed setting  in finalize_config() 
# which means access config before finalize can be dangerous
# always remember to add a space after :

setting_name: base
test_dataset_type: null
clip_size: 8
var_clip_size: -1

model:
  teacher: null
  pretrained: null
  fc_weight: null
  fc_bias: null
  patch:
    name: null
    fc_only: false
  feat_type: image
  tester: null
  tester_path: null
  tester_data_mode: null
  decodec:
    reg_loss_type: l1
    feat_loss_func: l1
    dis_model: basic
    gan_type: vanilla
  inco:
    kernel_size: 1
    pool_ref_type: sum
    temp_kernel_size: 3
    spatial_sizes: []
    spatial_count: 0
    no_time_pool: false
    keep_stride_count: 0
    i3d_routine: true
    SOLVER: 
      BASE_LR: 0.1
      LR_POLICY: cosine
      MAX_EPOCH: 196
      MOMENTUM: 0.9
      WEIGHT_DECAY: 1e-4
      WARMUP_EPOCHS: 34.0
      WARMUP_START_LR: 0.01
      OPTIMIZING_METHOD: sgd
  transformer:
    patch_type: null #time,spatial,all
    dim: -1
    stop_point: 6
    random_select: true
    k: 8
    sigmoid_before: false
  denoise:
    layers: []

test_on_train: false

test: false
debug: false
pre_load_data: false
