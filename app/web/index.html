<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deepfake Model Tester</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --line: #d7dee8;
      --text: #17202c;
      --muted: #647184;
      --blue: #2458c9;
      --blue-dark: #173f96;
      --green: #167647;
      --amber: #b86500;
      --red: #b42318;
      --ink-soft: #2f3b4d;
      --shadow: 0 18px 45px rgba(23, 32, 44, 0.08);
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .app-shell {
      width: calc(100% - 32px);
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      font-weight: 800;
    }

    h2 {
      margin-bottom: 14px;
      font-size: 18px;
      line-height: 1.2;
    }

    .health-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink-soft);
      box-shadow: 0 8px 22px rgba(23, 32, 44, 0.05);
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--amber);
    }

    .dot.online {
      background: var(--green);
    }

    .dot.offline {
      background: var(--red);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(310px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .control-panel {
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 15px;
    }

    .field label,
    .option-title {
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
    }

    .input,
    .select {
      width: 100%;
      min-width: 0;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 11px;
    }

    .input[type="file"] {
      padding: 8px;
    }

    .select:focus,
    .input:focus {
      outline: 3px solid rgba(36, 88, 201, 0.18);
      border-color: var(--blue);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .segmented label {
      display: grid;
      place-items: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label:has(input:checked) {
      border-color: var(--blue);
      background: #e6edff;
      color: var(--blue-dark);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 36px;
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 650;
    }

    .check-row input {
      width: 17px;
      height: 17px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 18px;
    }

    .primary,
    .secondary {
      min-height: 42px;
      border-radius: 6px;
      padding: 10px 14px;
      font-weight: 800;
    }

    .primary {
      background: var(--blue);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      background: var(--blue-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
    }

    .secondary:hover:not(:disabled) {
      border-color: #aeb9c8;
      background: #f8fafc;
    }

    .hint,
    .message {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .preview-panel {
      min-height: 440px;
      overflow: hidden;
    }

    .preview-head,
    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .preview-body {
      display: grid;
      min-height: 375px;
      place-items: center;
      background: #101722;
    }

    .preview-body.empty {
      background: var(--surface-2);
    }

    .preview-body img,
    .preview-body video {
      display: block;
      width: 100%;
      height: 100%;
      max-height: 560px;
      object-fit: contain;
      background: #101722;
    }

    .empty-state {
      max-width: 360px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
    }

    .results-panel {
      margin-top: 18px;
      overflow: hidden;
    }

    .results-panel[hidden] {
      display: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .metric {
      padding: 14px 18px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1.15;
    }

    .score-meter {
      height: 9px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #dde5ef;
    }

    .score-meter span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--blue);
    }

    .model-results {
      padding: 0 18px 4px;
    }

    .model-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) 130px 110px minmax(180px, 1.4fr);
      gap: 12px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .model-row:last-child {
      border-bottom: 0;
    }

    .model-name {
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      border-radius: 999px;
      padding: 5px 9px;
      background: var(--surface-2);
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .pill.suspicious,
    .pill.error,
    .pill.unavailable {
      background: #fff1f0;
      color: var(--red);
    }

    .pill.uncertain {
      background: #fff5e6;
      color: var(--amber);
    }

    .pill.likely_real,
    .pill.ok {
      background: #e9f8ef;
      color: var(--green);
    }

    .raw {
      margin: 0;
      padding: 0 18px 18px;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    summary {
      cursor: pointer;
      color: var(--ink-soft);
      font-weight: 800;
    }

    pre {
      max-height: 360px;
      overflow: auto;
      margin: 12px 0 0;
      border-radius: 6px;
      background: #111827;
      color: #e6edf7;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
    }

    .toast {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .toast.error {
      color: var(--red);
    }

    @media (max-width: 860px) {
      .app-shell {
        width: 100%;
        max-width: 680px;
        padding: 18px 12px 40px;
      }

      .topbar,
      .preview-head,
      .results-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace,
      .summary-grid,
      .model-row {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        min-height: 320px;
      }

      .preview-body {
        min-height: 260px;
      }

      .metric {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .metric:last-child {
        border-bottom: 0;
      }

      .model-row {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LAN inference console</p>
        <h1>Deepfake Model Tester</h1>
      </div>
      <div class="health-pill" aria-live="polite">
        <span id="healthDot" class="dot"></span>
        <span id="healthText">Checking backend</span>
      </div>
    </header>

    <section class="workspace">
      <form id="analysisForm" class="panel control-panel">
        <h2>Run Analysis</h2>

        <div class="field">
          <label for="fileInput">Media</label>
          <input id="fileInput" class="input" type="file" accept="image/*,video/*" required>
          <p id="fileHint" class="hint">Images and videos are sent to this PC backend.</p>
        </div>

        <div class="field">
          <label for="modelSelect">Model</label>
          <select id="modelSelect" class="select">
            <option value="available">Available models</option>
            <option value="all">All configured models</option>
          </select>
        </div>

        <div class="field" id="videoOptions">
          <div class="option-title">Video preset</div>
          <div class="segmented">
            <label><input type="radio" name="videoPreset" value="quick" checked>Quick</label>
            <label><input type="radio" name="videoPreset" value="balanced">Balanced</label>
            <label><input type="radio" name="videoPreset" value="thorough">Thorough</label>
          </div>
        </div>

        <div class="field" id="frameField">
          <label for="videoFrames">Frame limit</label>
          <input id="videoFrames" class="input" type="number" min="1" step="1" placeholder="Use preset">
        </div>

        <label class="check-row">
          <input id="includeDetails" type="checkbox">
          Include model details
        </label>

        <div class="actions">
          <button id="submitButton" class="primary" type="submit">Run analysis</button>
          <button id="resetButton" class="secondary" type="button">Reset</button>
        </div>

        <div id="toast" class="toast" role="status" aria-live="polite"></div>
      </form>

      <section class="panel preview-panel">
        <div class="preview-head">
          <div>
            <h2>Preview</h2>
            <p id="mediaMeta" class="message">No file selected</p>
          </div>
        </div>
        <div id="previewBody" class="preview-body empty">
          <div class="empty-state">Select a media file to preview it here.</div>
        </div>
      </section>
    </section>

    <section id="resultsPanel" class="panel results-panel" hidden>
      <div class="results-head">
        <div>
          <h2>Result</h2>
          <p id="resultMeta" class="message"></p>
        </div>
      </div>
      <div class="summary-grid">
        <div class="metric">
          <span>Status</span>
          <strong id="summaryStatus">-</strong>
        </div>
        <div class="metric">
          <span>Fake score</span>
          <strong id="fakeScore">-</strong>
          <div class="score-meter" aria-hidden="true"><span id="fakeMeter"></span></div>
        </div>
        <div class="metric">
          <span>Real score</span>
          <strong id="realScore">-</strong>
        </div>
        <div class="metric">
          <span>Processing</span>
          <strong id="processingTime">-</strong>
        </div>
      </div>
      <div id="modelResults" class="model-results"></div>
      <div class="raw">
        <details>
          <summary>Raw JSON</summary>
          <pre id="rawJson"></pre>
        </details>
      </div>
    </section>
  </main>

  <script>
    const imageExtensions = new Set([".bmp", ".jpeg", ".jpg", ".png", ".tif", ".tiff", ".webp"]);
    const videoExtensions = new Set([".avi", ".m4v", ".mkv", ".mov", ".mp4", ".mpeg", ".mpg", ".webm"]);

    const healthDot = document.getElementById("healthDot");
    const healthText = document.getElementById("healthText");
    const form = document.getElementById("analysisForm");
    const fileInput = document.getElementById("fileInput");
    const fileHint = document.getElementById("fileHint");
    const modelSelect = document.getElementById("modelSelect");
    const videoOptions = document.getElementById("videoOptions");
    const frameField = document.getElementById("frameField");
    const videoFrames = document.getElementById("videoFrames");
    const includeDetails = document.getElementById("includeDetails");
    const submitButton = document.getElementById("submitButton");
    const resetButton = document.getElementById("resetButton");
    const toast = document.getElementById("toast");
    const previewBody = document.getElementById("previewBody");
    const mediaMeta = document.getElementById("mediaMeta");
    const resultsPanel = document.getElementById("resultsPanel");
    const resultMeta = document.getElementById("resultMeta");
    const summaryStatus = document.getElementById("summaryStatus");
    const fakeScore = document.getElementById("fakeScore");
    const realScore = document.getElementById("realScore");
    const fakeMeter = document.getElementById("fakeMeter");
    const processingTime = document.getElementById("processingTime");
    const modelResults = document.getElementById("modelResults");
    const rawJson = document.getElementById("rawJson");

    let previewUrl = "";
    let currentKind = "";

    function setToast(message, isError = false) {
      toast.textContent = message;
      toast.classList.toggle("error", isError);
    }

    function extensionOf(file) {
      const name = file?.name || "";
      const dot = name.lastIndexOf(".");
      return dot >= 0 ? name.slice(dot).toLowerCase() : "";
    }

    function detectKind(file) {
      if (!file) return "";
      const extension = extensionOf(file);
      if (imageExtensions.has(extension)) return "image";
      if (videoExtensions.has(extension)) return "video";
      if (file.type.startsWith("image/")) return "image";
      if (file.type.startsWith("video/")) return "video";
      return "";
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "-";
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }
      return `${size.toFixed(size >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    function formatScore(value) {
      return typeof value === "number" ? `${Math.round(value * 1000) / 10}%` : "-";
    }

    function formatSeconds(value) {
      return typeof value === "number" ? `${value.toFixed(value >= 10 ? 1 : 2)}s` : "-";
    }

    async function checkHealth() {
      try {
        const response = await fetch("/health", { cache: "no-store" });
        if (!response.ok) throw new Error("Backend offline");
        healthDot.className = "dot online";
        healthText.textContent = "Backend online";
      } catch (error) {
        healthDot.className = "dot offline";
        healthText.textContent = "Backend offline";
      }
    }

    async function loadModels(kind = "") {
      const suffix = kind ? `?input_type=${encodeURIComponent(kind)}` : "";
      const response = await fetch(`/models${suffix}`, { cache: "no-store" });
      if (!response.ok) throw new Error("Could not load model list");
      const payload = await response.json();
      renderModelOptions(payload.models || []);
    }

    function renderModelOptions(models) {
      const previous = modelSelect.value || "available";
      modelSelect.innerHTML = "";

      const baseOptions = [
        ["available", "Available models"],
        ["all", "All configured models"]
      ];
      for (const [value, label] of baseOptions) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        modelSelect.append(option);
      }

      const uniqueModels = new Map();
      for (const model of models) {
        const existing = uniqueModels.get(model.model_id);
        if (!existing) {
          uniqueModels.set(model.model_id, { ...model });
          continue;
        }
        existing.available = existing.available || model.available;
        if (existing.message !== "ready" && model.message === "ready") {
          existing.message = model.message;
        }
      }

      for (const model of uniqueModels.values()) {
        const option = document.createElement("option");
        option.value = model.model_id;
        option.textContent = `${model.model_name} - ${model.available ? "ready" : "missing"}`;
        option.disabled = !model.available;
        option.title = model.message || "";
        modelSelect.append(option);
      }

      const values = Array.from(modelSelect.options).map((option) => option.value);
      modelSelect.value = values.includes(previous) ? previous : "available";
    }

    function setVideoControls(kind) {
      const isVideo = kind === "video";
      videoOptions.style.display = isVideo ? "grid" : "none";
      frameField.style.display = isVideo ? "grid" : "none";
    }

    function clearPreview() {
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = "";
      previewBody.className = "preview-body empty";
      previewBody.innerHTML = '<div class="empty-state">Select a media file to preview it here.</div>';
      mediaMeta.textContent = "No file selected";
      currentKind = "";
      setVideoControls("");
    }

    function renderPreview(file, kind) {
      if (previewUrl) URL.revokeObjectURL(previewUrl);
      previewUrl = URL.createObjectURL(file);
      previewBody.className = "preview-body";
      previewBody.innerHTML = "";

      const media = document.createElement(kind === "image" ? "img" : "video");
      media.src = previewUrl;
      if (kind === "video") {
        media.controls = true;
        media.preload = "metadata";
      }
      media.alt = file.name;
      previewBody.append(media);
      mediaMeta.textContent = `${file.name} - ${kind} - ${formatBytes(file.size)}`;
    }

    function renderResults(payload) {
      const summary = payload.summary || {};
      const results = Array.isArray(payload.results) ? payload.results : [];
      resultsPanel.hidden = false;
      resultMeta.textContent = `${payload.filename || "Uploaded media"} - result ${payload.id || "-"}`;
      summaryStatus.textContent = summary.status || "-";
      fakeScore.textContent = formatScore(summary.fake_score);
      realScore.textContent = formatScore(summary.real_score);
      processingTime.textContent = formatSeconds(summary.processing_time);
      fakeMeter.style.width = typeof summary.fake_score === "number"
        ? `${Math.max(0, Math.min(100, summary.fake_score * 100))}%`
        : "0";

      modelResults.innerHTML = "";
      if (!results.length) {
        const empty = document.createElement("p");
        empty.className = "message";
        empty.style.padding = "16px 0";
        empty.textContent = "No model returned a score.";
        modelResults.append(empty);
      }

      for (const result of results) {
        const row = document.createElement("div");
        row.className = "model-row";

        const name = document.createElement("div");
        name.className = "model-name";
        name.textContent = result.model_name || result.model_id || "Model";

        const status = document.createElement("span");
        status.className = `pill ${result.status || ""}`;
        status.textContent = result.status || "-";

        const score = document.createElement("div");
        score.textContent = formatScore(result.fake_score);

        const message = document.createElement("div");
        message.className = "message";
        message.textContent = result.message || formatSeconds(result.processing_time);

        row.append(name, status, score, message);
        modelResults.append(row);
      }

      rawJson.textContent = JSON.stringify(payload, null, 2);
    }

    async function analyzeSelectedFile(event) {
      event.preventDefault();
      const file = fileInput.files[0];
      const kind = detectKind(file);
      if (!file || !kind) {
        setToast("Choose a supported image or video file.", true);
        return;
      }

      const data = new FormData();
      data.append("file", file);
      data.append("model", modelSelect.value);
      data.append("include_details", includeDetails.checked ? "true" : "false");
      if (kind === "video") {
        data.append("video_preset", document.querySelector("input[name='videoPreset']:checked").value);
        if (videoFrames.value.trim()) data.append("video_frames", videoFrames.value.trim());
      }

      submitButton.disabled = true;
      setToast("Uploading and running analysis...");
      try {
        const endpoint = kind === "image" ? "/analyze-image" : "/analyze-video";
        const response = await fetch(endpoint, { method: "POST", body: data });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "Analysis failed");
        }
        renderResults(payload);
        setToast("Analysis complete.");
      } catch (error) {
        setToast(error.message || "Analysis failed", true);
      } finally {
        submitButton.disabled = false;
      }
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      const kind = detectKind(file);
      if (!file) {
        clearPreview();
        await loadModels();
        return;
      }
      if (!kind) {
        clearPreview();
        fileHint.textContent = "Unsupported file type.";
        setToast("Choose a supported image or video file.", true);
        return;
      }

      currentKind = kind;
      fileHint.textContent = `${kind[0].toUpperCase()}${kind.slice(1)} selected`;
      setToast("");
      setVideoControls(kind);
      renderPreview(file, kind);
      try {
        await loadModels(kind);
      } catch (error) {
        setToast(error.message, true);
      }
    });

    resetButton.addEventListener("click", async () => {
      form.reset();
      clearPreview();
      resultsPanel.hidden = true;
      fileHint.textContent = "Images and videos are sent to this PC backend.";
      setToast("");
      await loadModels();
    });

    form.addEventListener("submit", analyzeSelectedFile);

    setVideoControls("");
    checkHealth();
    loadModels().catch((error) => setToast(error.message, true));
  </script>
</body>
</html>
