services:
  backend:
    build:
      context: .
      args:
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    image: model-tester-backend:latest
    ports:
      - "${MODEL_TESTER_BIND_ADDRESS:-0.0.0.0}:${MODEL_TESTER_PORT:-8000}:8000"
    environment:
      MODEL_TESTER_DEFAULT_MODEL: ${MODEL_TESTER_DEFAULT_MODEL:-available}
      MODEL_TESTER_ALLOWED_ORIGINS: "${MODEL_TESTER_ALLOWED_ORIGINS:-*}"
    volumes:
      - ./models:/app/models
      - ./auxillary:/app/auxillary
      - ./data:/app/data
      - ./outputs:/app/outputs
